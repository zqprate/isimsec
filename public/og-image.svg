<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFF8FF"/>
      <stop offset="35%" stop-color="#DBEEFE"/>
      <stop offset="70%" stop-color="#FEF7E0"/>
      <stop offset="100%" stop-color="#FFF5F0"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B93F5"/>
      <stop offset="50%" stop-color="#2574EA"/>
      <stop offset="100%" stop-color="#1D5DD7"/>
    </linearGradient>
    <linearGradient id="gold" x1="40" y1="0" x2="40" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="200" cy="150" r="200" fill="#3B93F5" opacity="0.06"/>
  <circle cx="1000" cy="500" r="250" fill="#FBBF24" opacity="0.05"/>
  <circle cx="600" cy="600" r="180" fill="#F56565" opacity="0.03"/>

  <!-- Logo mark -->
  <g transform="translate(480, 160)">
    <rect x="0" y="0" width="80" height="80" rx="22" fill="url(#logo-grad)"/>
    <rect x="0" y="0" width="80" height="80" rx="22" fill="white" opacity="0.08"/>
    <rect x="18" y="26" width="7.5" height="34" rx="3.75" fill="white"/>
    <circle cx="21.75" cy="17.5" r="4.5" fill="url(#gold)"/>
    <path d="M40 26c8.3 0 13.3 3 13.3 8.3s-5.8 7-13.3 7.5c-7.5.5-13.3 2.5-13.3 7.5s5 8.3 13.3 8.3" stroke="white" stroke-width="7.5" stroke-linecap="round" fill="none"/>
    <circle cx="63" cy="16" r="2.5" fill="url(#gold)" opacity="0.7"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#1E4289" letter-spacing="-1">
    İsim<tspan fill="#3B93F5">Seç</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748B" font-weight="500">
    Bebek İsmi Keşif Platformu
  </text>

  <!-- Stats bar -->
  <g transform="translate(300, 400)">
    <rect x="0" y="0" width="600" height="70" rx="16" fill="white" opacity="0.6"/>
    <rect x="0" y="0" width="600" height="70" rx="16" stroke="#DBEEFE" stroke-width="1"/>

    <text x="100" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1E4DAE">643+</text>
    <text x="100" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94A3B8">İsim</text>

    <line x1="200" y1="14" x2="200" y2="56" stroke="#DBEEFE" stroke-width="1"/>

    <text x="300" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1E4DAE">4</text>
    <text x="300" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94A3B8">Dil</text>

    <line x1="400" y1="14" x2="400" y2="56" stroke="#DBEEFE" stroke-width="1"/>

    <text x="500" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1E4DAE">6</text>
    <text x="500" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94A3B8">Araç</text>
  </g>

  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94A3B8" font-weight="500">
    www.isimsec.com
  </text>
</svg>
